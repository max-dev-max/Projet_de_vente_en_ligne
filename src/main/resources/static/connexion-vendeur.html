<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assigame – Connexion Vendeur</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/connexion-vendeur.css" />
  <script>window.ASSIGAME_AUTH_SCOPE='vendor';</script>
</head>
<body class="connexion-vendeur-body">

  <div class="page">

    <!-- Logo -->
    <div class="logo">Assigame</div>

    <!-- Card -->
    <div class="card">
      <h1>Connexion Vendeur</h1>
      <p class="subtitle">Accédez à votre espace de vente et gérez vos produits</p>

      <form id="loginForm" novalidate>

        <p class="form-error" id="loginError" hidden role="alert"></p>

        <!-- Email -->
        <div class="form-group">
          <label for="email">Adresse Email</label>
          <div class="input-wrapper">
            <span class="input-icon">✉️</span>
            <input type="email" id="email" name="email" placeholder="nom@exemple.com" autocomplete="email" required />
          </div>
        </div>

        <!-- Mot de passe -->
        <div class="form-group">
          <div class="label-row">
            <label for="password">Mot de passe</label>
            <a href="#" class="forgot">Mot de passe oublié ?</a>
          </div>
          <div class="input-wrapper password-field">
            <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
            <button type="button" class="toggle-password" aria-label="Afficher le mot de passe" aria-pressed="false">
              <svg class="icon-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg class="icon-eye-slash" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
                <path d="M1 1l22 22"></path>
                <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path>
              </svg>
            </button>
          </div>
        </div>

        <!-- Bouton -->
        <button type="submit" class="btn-primary" id="btnLogin">Se connecter</button>

      </form>

      <!-- Séparateur -->
      <div class="divider">
        <span>Ou</span>
      </div>

      <!-- Inscription -->
      <p class="register">
        Pas encore de compte ? <a href="/devenir-vendeur.html">Devenir vendeur</a>
      </p>

      <!-- SSL -->
      <p class="ssl">🔒 Connexion sécurisée SSL</p>

    </div>

    <!-- Footer -->
    <footer class="footer">
      <span>© 2024 Assigame. Tous droits réservés.</span>
      <div class="footer-links">
        <a href="#">Conditions Générales</a>
        <a href="#">Politique de Confidentialité</a>
        <a href="#">Contact</a>
        <a href="#">Aide</a>
      </div>
    </footer>

  </div>

  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/connexion-vendeur.js"></script>
</body>
</html>
