<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion des Catégories - Assigame</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/global.css">
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
</head>
<body class="app-layout" data-admin-page="categories">

  <aside class="sidebar" aria-label="Navigation admin">
    <div class="sidebar-header"><i class="ph ph-shield-check"></i> Assigame Admin</div>
    <nav class="sidebar-nav">
      <a href="/admin/administration.html" class="nav-link" data-page="dashboard"><i class="ph ph-squares-four"></i> Dashboard</a>
      <a href="/admin/demandes-vendeur.html" class="nav-link" data-page="demandes-vendeur"><i class="ph ph-users-three"></i> Demandes vendeur</a>
      <a href="/admin/demandes-produits.html" class="nav-link" data-page="demandes-produits"><i class="ph ph-package"></i> Produits en attente</a>
      <a href="/admin/moderation-produits.html" class="nav-link" data-page="moderation-produits"><i class="ph ph-magnifying-glass"></i> Modération</a>
      <a href="/admin/categories.html" class="nav-link" data-page="categories"><i class="ph ph-grid-four"></i> Catégories</a>
    </nav>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <h1 class="topbar-title">Gestion des catégories</h1>
      <div class="d-flex gap-4">
        <button type="button" class="btn btn-primary" id="createCategoryBtn"><i class="ph ph-plus"></i> Créer une catégorie</button>
        <button type="button" class="btn btn-secondary" id="btnLogout"><i class="ph ph-sign-out"></i> Déconnexion</button>
      </div>
    </header>
    <div class="page-content">
      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>Nom</th>
              <th>Description</th>
              <th class="num">Produits</th>
              <th class="actions">Actions</th>
            </tr>
          </thead>
          <tbody id="categoryTableBody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <div class="modal-overlay" id="categoryModal" hidden>
    <div class="modal-card" role="dialog" aria-labelledby="categoryModalTitle">
      <h2 id="categoryModalTitle">Créer une catégorie</h2>
      <form id="categoryForm">
        <div class="form-group">
          <label class="form-label" for="nom_categorieproduit">Nom *</label>
          <input class="form-control" id="nom_categorieproduit" name="nom_categorieproduit" maxlength="70" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="description">Description *</label>
          <textarea class="form-control" id="description" name="description" maxlength="100" rows="3" required></textarea>
        </div>
        <div class="d-flex gap-4 justify-between">
          <button type="button" class="btn btn-secondary" data-close-modal>Annuler</button>
          <button type="submit" class="btn btn-primary">Enregistrer</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast" role="alert" aria-live="assertive"></div>
  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/admin/common.js"></script>
  <script src="/js/admin/categories.js"></script>
  <script>document.getElementById('btnLogout')?.addEventListener('click',function(){AssigameAPI.logout();location.href='/catalogue.html';});</script>
</body>
</html>
