<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assigame – Connexion Admin</title>
  <link rel="stylesheet" href="/css/admin/connexion-admin.css" />
</head>
<body>

  <div class="page">

    <!-- Logo -->
    <div class="logo-block">
      <div class="logo-icon">A</div>
      <span class="logo-text">Assigame</span>
    </div>

    <!-- Card -->
    <div class="card">
      <h1>Connexion Admin</h1>
      <p class="subtitle">Accédez au panneau de gestion sécurisé</p>

      <form>

        <!-- Email -->
        <div class="form-group">
          <label for="email">Adresse Email</label>
          <div class="input-wrapper">
            <span class="input-icon">✉️</span>
            <input type="email" id="email" placeholder="admin@assigame.com" />
          </div>
        </div>

        <!-- Mot de passe -->
        <div class="form-group">
          <label for="password">Mot de passe</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" placeholder="••••••••" />
            <span class="input-icon-right">👁️</span>
          </div>
        </div>

        <!-- Mot de passe oublié -->
        <div class="forgot-row">
          <a href="#" class="forgot">Mot de passe oublié ?</a>
        </div>

        <!-- Bouton -->
        <button type="submit" class="btn-primary">Se connecter</button>

      </form>

      <!-- SSL -->
      <p class="ssl">🔒 Connexion sécurisée SSL 256-bit</p>

    </div>

    <!-- Badge réservé -->
    <div class="badge-reserved">
      🔵 Réservé au personnel autorisé uniquement
    </div>

    <!-- Footer -->
    <footer class="footer">
      <span>© 2024 Assigame. Tous droits réservés.</span>
      <div class="footer-links">
        <a href="#">Conditions Générales</a>
        <a href="#">Politique de Confidentialité</a>
        <a href="#">Aide</a>
      </div>
    </footer>

  </div>

</body>
</html>
