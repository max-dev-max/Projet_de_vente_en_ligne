<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paiement - Assigame</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/global.css">
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
</head>
<body class="auth-layout" style="background-color:var(--bg-canvas);">

  <div class="auth-container vendeur-payment-container">
    <div class="vendeur-payment-head">
      <i class="ph ph-shield-check"></i>
      <h1>Finalisez votre abonnement</h1>
      <p>Étape 3 sur 3 — Paiement sécurisé</p>
    </div>

    <div class="card">
      <div class="payment-summary">
        <div class="d-flex justify-between align-center mb-2">
          <span id="planLabel">Chargement…</span>
          <strong id="planPrice">—</strong>
        </div>
        <p class="payment-summary-note">Facturé mensuellement. Annulable à tout moment.</p>
      </div>

      <form id="paymentForm">
        <h3>Informations de facturation</h3>
        <div class="form-group">
          <label class="form-label" for="cardName">Nom sur la carte</label>
          <input type="text" class="form-control" id="cardName" required placeholder="Jean Dupont">
        </div>
        <h3>Détails de la carte</h3>
        <div class="form-group">
          <label class="form-label" for="cardNumber">Numéro de carte</label>
          <input type="text" class="form-control" id="cardNumber" required placeholder="0000 0000 0000 0000" inputmode="numeric">
        </div>
        <div class="payment-row">
          <div class="form-group">
            <label class="form-label" for="cardExpiry">Expiration</label>
            <input type="text" class="form-control" id="cardExpiry" required placeholder="MM/AA">
          </div>
          <div class="form-group">
            <label class="form-label" for="cardCvc">CVC</label>
            <input type="text" class="form-control" id="cardCvc" required placeholder="123" inputmode="numeric">
          </div>
        </div>
        <p class="payment-secure"><i class="ph ph-lock-key"></i> Paiement simulé — intégration passerelle à brancher.</p>
        <div class="d-flex gap-4">
          <a href="/vendeur/offres-paiement.html" class="btn btn-secondary w-100">Retour</a>
          <button type="submit" class="btn btn-primary w-100"><i class="ph ph-check"></i> Payer</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast" role="alert" aria-live="assertive"></div>
  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/vendeur/paiement.js"></script>
</body>
</html>
