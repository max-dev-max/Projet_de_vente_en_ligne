<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Place Vendeur - Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/vendeur/dashboard.css">
</head>
<body>

  <div class="app">

    <!-- ============ SIDEBAR (menu de gauche) ============ -->
    <aside class="sidebar">

      <!-- Logo -->
      <div class="logo">
        <span class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/>
            <path d="M3 6h18"/>
            <path d="M16 10a4 4 0 0 1-8 0"/>
          </svg>
        </span>
        <span class="logo-text">Place vendeur</span>
      </div>

      <!-- Navigation principale -->
      <nav class="nav-menu">
        <ul>
          <li class="nav-item active">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="9" rx="1"/>
                <rect x="14" y="3" width="7" height="5" rx="1"/>
                <rect x="14" y="12" width="7" height="9" rx="1"/>
                <rect x="3" y="16" width="7" height="5" rx="1"/>
              </svg>
            </span>
            <span>Dashboard</span>
          </li>
         <a href="/vendeur/produits-ajout.html"><li class="nav-item">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
                <path d="m3.3 7 8.7 5 8.7-5"/>
                <path d="M12 22V12"/>
              </svg>
            </span>
            <span>Produits</span>
          </li></a>
        </ul>
      </nav>

      <!-- Profil admin en bas -->
      <div class="sidebar-footer">
        <div class="admin-profile">
          <img src="" alt="Avatar" class="avatar">
          <div class="admin-info">
            <span class="admin-name" id="vendorName"></span>
            <span class="admin-email" id="vendorEmail"></span>
          </div>
        </div>
        <span class="logout-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </span>
      </div>

    </aside>

    <!-- ============ CONTENU PRINCIPAL ============ -->
    <div class="main-content">

      <!-- Barre du haut -->
      <header class="topbar">
        <h1>Dashboard</h1>
        <div class="topbar-actions">
          <span class="icon-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
              <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
            </svg>
          </span>
          <span class="icon-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
            </svg>
          </span>
        </div>
      </header>

      <!-- Contenu scrollable -->
      <main class="dashboard-body">

        <!-- Bandeau "Aperçu Vendeur" -->
        <section class="overview-banner">
          <div>
            <h2>Aperçu Vendeur</h2>
            <p>Gérez vos inventaire et suivez vos performances.</p>
          </div>
          <a href="/vendeur/produits-ajout.html"><button class="btn-primary">+ Ajouter un produit</button></a>
        </section>

        <!-- Cartes statistiques -->
        <section class="stats-grid">

          <div class="stat-card">
            <div class="stat-top">
              <span class="stat-icon success">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"/>
                  <path d="m9 12 2 2 4-4"/>
                </svg>
              </span>
              <span class="stat-badge success" id="statPublishedBadge"></span>
            </div>
            <p class="stat-label">Produits publiés</p>
            <p class="stat-value" id="statPublished"></p>
          </div>

          <div class="stat-card">
            <div class="stat-top">
              <span class="stat-icon warning">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"/>
                  <polyline points="12 6 12 12 16 14"/>
                </svg>
              </span>
              <span class="stat-badge neutral" id="statPendingBadge"></span>
            </div>
            <p class="stat-label">En attente</p>
            <p class="stat-value" id="statPending"></p>
          </div>

          <div class="stat-card">
            <div class="stat-top">
              <span class="stat-icon danger">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"/>
                  <path d="m15 9-6 6"/>
                  <path d="m9 9 6 6"/>
                </svg>
              </span>
              <span class="stat-badge danger" id="statRefusedBadge"></span>
            </div>
            <p class="stat-label">Refusés</p>
            <p class="stat-value" id="statRefused"></p>
          </div>

          <div class="stat-card">
            <div class="stat-top">
              <span class="stat-icon muted">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 2v10"/>
                  <path d="M18.4 6.6a9 9 0 1 1-12.77.04"/>
                </svg>
              </span>
            </div>
            <p class="stat-label">Suspendus</p>
            <p class="stat-value" id="statSuspended"></p>
          </div>

        </section>

        <!-- Graphique + Activités récentes -->
        <section class="bottom-grid">

          <!-- Graphique -->
          <div class="chart-card">
            <div class="chart-header">
              <h3>Activité des annonces</h3>
              <select class="period-select" id="periodSelect">
                <option value="7">7 derniers jours</option>
                <option value="30">30 derniers jours</option>
              </select>
            </div>
            <div class="chart-area-wrapper">
              <div class="y-axis">
                <span>150</span>
                <span>100</span>
                <span>50</span>
                <span>0</span>
              </div>
              <div class="chart-area" id="chartArea">
                <!-- Les barres seront générées en JS -->
              </div>
            </div>
          </div>

          <!-- Activités récentes -->
          <div class="activity-card">
            <h3>Activités récentes</h3>
            <ul class="activity-list" id="activityList"></ul>
          </div>

        </section>

      </main>

    </div>

  </div>

  <script src="/js/vendeur/dashboard.js"></script>

</body>
</html>
