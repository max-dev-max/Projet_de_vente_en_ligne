<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmation - Assigame</title>
  <link rel="stylesheet" href="/css/global.css">
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
</head>
<body class="auth-layout" style="background-color:var(--bg-canvas);">

  <div class="auth-container" style="max-width:500px;">
    <div class="card vendeur-confirm-card">
      <div class="vendeur-confirm-icon"><i class="ph ph-check"></i></div>
      <h1>Paiement réussi !</h1>
      <p>Merci pour votre souscription. Votre demande vendeur est en cours de validation par notre équipe.</p>

      <div class="payment-receipt">
        <div class="d-flex justify-between mb-2">
          <span>Offre</span>
          <strong id="confirmPlan">Professionnel</strong>
        </div>
        <div class="d-flex justify-between mb-2">
          <span>Montant</span>
          <strong id="confirmAmount">19 000 FCFA</strong>
        </div>
        <div class="d-flex justify-between">
          <span>Transaction</span>
          <span style="font-family:monospace;">#TX-ASSIGAME</span>
        </div>
      </div>

      <a href="/catalogue.html" class="btn btn-primary w-100">
        <i class="ph ph-storefront"></i> Retour au catalogue
      </a>
    </div>
  </div>

  <script>
    (function () {
      var plan = new URLSearchParams(location.search).get('plan') || 'pro';
      var map = {
        demarrage: { name: 'Démarrage', amount: '0 FCFA' },
        pro: { name: 'Professionnel', amount: '19 000 FCFA' }
      };
      var p = map[plan] || map.pro;
      document.getElementById('confirmPlan').textContent = p.name;
      document.getElementById('confirmAmount').textContent = p.amount;
    })();
  </script>
</body>
</html>
