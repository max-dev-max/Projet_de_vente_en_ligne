<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmation - Assigame</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/global.css">
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
</head>
<body class="auth-layout" style="background-color:var(--bg-canvas);">

  <div class="auth-container" style="max-width:500px;">
    <div class="card vendeur-confirm-card">
      <div class="vendeur-confirm-icon"><i class="ph ph-check"></i></div>
      <h1>Paiement réussi !</h1>
      <p>Merci pour votre souscription. Votre demande vendeur est en cours de validation par notre équipe.</p>

      <div class="payment-receipt">
        <div class="d-flex justify-between mb-2">
          <span>Offre</span>
          <span id="confirmPlan">—</span>
        </div>
        <div class="d-flex justify-between mb-2">
          <span>Montant</span>
          <strong id="confirmAmount">—</strong>
        </div>
        <div class="d-flex justify-between">
          <span>Transaction</span>
          <span id="confirmTx" style="font-family:monospace;">—</span>
        </div>
      </div>

      <a href="/catalogue.html" class="btn btn-primary w-100">
        <i class="ph ph-storefront"></i> Retour au catalogue
      </a>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/vendeur/confirmation-paiement.js"></script>
</body>
</html>
